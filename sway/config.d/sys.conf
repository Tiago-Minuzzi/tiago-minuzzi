
##############
# My configs #
##############
# Hide cursor after time
seat * hide_cursor 8000

# Keyboard
input * {
        xkb_layout "us"
        xkb_variant "intl"
        dwt enabled
        tap disabled
        natural_scroll disabled
        middle_emulation enabled
}
exec_always wl-paste --watch cliphist store
exec_always /usr/lib/mate-polkit/polkit-mate-authentication-agent-1
exec_always ~/.config/sway/scripts/battery-warning.sh
exec_always ~/.swaybg

# windoww borders
for_window [title="^.*"] border pixel 2

# Apps to workspaces
assign [app_id="app.zen_browser.zen"] workspace 10
assign [app_id="dev.zed.Zed"] workspace 2
assign [app_id="firefox"] workspace 9

# floating windows
for_window [app_id="bluetui"] floating enabled
for_window [app_id="com.rafaelmardojai.Blanket"] floating enabled
for_window [app_id="htop"] floating enabled
for_window [app_id="org.pulseaudio.pavucontrol"] floating enabled
